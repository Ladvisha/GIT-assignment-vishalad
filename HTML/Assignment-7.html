<!DOCTYPE html>
<html>
<head>
    <title>Multimedia Practice</title>
</head>
<body>

<h1>HTML Multimedia and iFrame Practice</h1>

<!-- PART 1: AUDIO -->
<h2>Audio Practice</h2>

<audio controls autoplay muted loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<br><br>

<!-- PART 2: VIDEO -->
<h2>Video Practice</h2>

<video width="500" height="300" controls muted>
    <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
</video>

<br><br>

<!-- PART 3: IFRAME -->
<h2>iFrame Practice</h2>

<!-- Video inside iframe -->
<iframe width="500" height="300"
        src="https://www.youtube.com/embed/tgbNymZ7vqY">
</iframe>

<br><br>

<!-- External Website -->
<iframe src="https://www.w3schools.com"
        width="500" height="300">
</iframe>

<br><br>

<!-- Local HTML file -->
<iframe src="anotherpage.html"
        width="500" height="300">
</iframe>

</body>
</html>
